<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallchain Airdrop</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Bai+Jamjuree:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;color:#F5F5F5;font-family:'Noto Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.pw-box{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:20px}
.pw-logo{font-family:'Bai Jamjuree',sans-serif;font-size:18px;font-weight:700;color:#F7D133;letter-spacing:.04em}
.pw-title{font-size:15px;color:rgba(245,245,245,.35);text-align:center;letter-spacing:.02em}
.pw-field-wrap{width:100%;position:relative}
.pw-field{width:100%;background:#141414;border:1px solid #3A3A3A;border-radius:12px;padding:13px 16px;color:#F5F5F5;font-family:inherit;font-size:15px;outline:none;transition:border-color .15s;letter-spacing:.04em}
.pw-field:focus{border-color:rgba(247,209,51,.4)}
.pw-field.err{border-color:rgba(239,83,80,.5);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pw-err{font-size:12px;color:rgba(239,83,80,.8);text-align:center;min-height:16px;transition:opacity .2s}
.pw-btn{width:100%;padding:13px;border-radius:100px;border:none;background:#F7D133;color:#151515;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.pw-btn:hover{background:#D9AE26}
.pw-btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{display:none;width:20px;height:20px;border:2px solid rgba(21,21,21,.3);border-top-color:#151515;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="pw-box">
  <div class="pw-logo">WALLCHAIN</div>
  <div class="pw-title">Enter password to access</div>
  <div class="pw-field-wrap">
    <input id="pw" class="pw-field" type="password" placeholder="Password" autocomplete="current-password">
  </div>
  <div id="pw-err" class="pw-err"></div>
  <button class="pw-btn" id="pw-btn" onclick="unlock()">Enter</button>
  <div class="spinner" id="spin"></div>
</div>

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    km,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  const btn  = document.getElementById('pw-btn');
  const spin = document.getElementById('spin');
  const err  = document.getElementById('pw-err');
  btn.disabled = true;
  spin.style.display = 'block';
  err.textContent = '';

  try {
    const combined = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const salt      = combined.slice(0, 16);
    const iv        = combined.slice(16, 28);
    const cipher    = combined.slice(28);
    const key       = await deriveKey(pw, salt);
    const plain     = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
    const html      = new TextDecoder().decode(plain);
    document.open();
    document.write(html);
    document.close();
  } catch {
    const field = document.getElementById('pw');
    err.textContent = 'Wrong password';
    field.classList.add('err');
    field.value = '';
    setTimeout(() => field.classList.remove('err'), 400);
    btn.disabled = false;
    spin.style.display = 'none';
  }
}
